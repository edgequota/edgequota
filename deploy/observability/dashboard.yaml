{
  "kind": "Dashboard",
  "metadata": {
    "name": "edgequota"
  },
  "spec": {
    "display": {
      "name": "EdgeQuota \u2014 Edge Rate Limiter / Quota"
    },
    "duration": "1h",
    "panels": {
      "req_rate": {
        "kind": "Panel",
        "spec": {
          "display": {
            "name": "Request rate (req/s)"
          },
          "plugin": {
            "kind": "StatChart",
            "spec": {
              "calculation": "last-number",
              "format": {
                "unit": "decimal"
              }
            }
          },
          "queries": [
            {
              "kind": "TimeSeriesQuery",
              "spec": {
                "plugin": {
                  "kind": "PrometheusTimeSeriesQuery",
                  "spec": {
                    "query": "sum(rate({otel_metric_name=\"edgequota.requests\"}[5m]))"
                  }
                }
              }
            }
          ]
        }
      },
      "err5xx": {
        "kind": "Panel",
        "spec": {
          "display": {
            "name": "5xx error ratio"
          },
          "plugin": {
            "kind": "StatChart",
            "spec": {
              "calculation": "last-number",
              "format": {
                "unit": "percent-decimal"
              }
            }
          },
          "queries": [
            {
              "kind": "TimeSeriesQuery",
              "spec": {
                "plugin": {
                  "kind": "PrometheusTimeSeriesQuery",
                  "spec": {
                    "query": "(sum(rate({otel_metric_name=\"edgequota.requests\", edgequota_status_class=\"5xx\"}[5m])) or vector(0)) / clamp_min(sum(rate({otel_metric_name=\"edgequota.requests\"}[5m])),1)"
                  }
                }
              }
            }
          ]
        }
      },
      "p95": {
        "kind": "Panel",
        "spec": {
          "display": {
            "name": "p95 latency"
          },
          "plugin": {
            "kind": "StatChart",
            "spec": {
              "calculation": "last-number",
              "format": {
                "unit": "seconds"
              }
            }
          },
          "queries": [
            {
              "kind": "TimeSeriesQuery",
              "spec": {
                "plugin": {
                  "kind": "PrometheusTimeSeriesQuery",
                  "spec": {
                    "query": "histogram_quantile(0.95, sum by (le)(rate({otel_metric_name=\"http.server.request.duration\", otel_metric_type=\"histogram\", service_name=\"edgequota\"}[5m])))"
                  }
                }
              }
            }
          ]
        }
      },
      "rl_pct": {
        "kind": "Panel",
        "spec": {
          "display": {
            "name": "Rate-limited %"
          },
          "plugin": {
            "kind": "StatChart",
            "spec": {
              "calculation": "last-number",
              "format": {
                "unit": "percent-decimal"
              }
            }
          },
          "queries": [
            {
              "kind": "TimeSeriesQuery",
              "spec": {
                "plugin": {
                  "kind": "PrometheusTimeSeriesQuery",
                  "spec": {
                    "query": "(sum(rate({otel_metric_name=\"edgequota.ratelimit.decisions\", edgequota_ratelimit_decision=\"limited\"}[5m])) or vector(0)) / clamp_min(sum(rate({otel_metric_name=\"edgequota.ratelimit.decisions\", edgequota_ratelimit_decision=\"allowed\"}[5m]))+sum(rate({otel_metric_name=\"edgequota.ratelimit.decisions\", edgequota_ratelimit_decision=\"limited\"}[5m])),1)"
                  }
                }
              }
            }
          ]
        }
      },
      "redis": {
        "kind": "Panel",
        "spec": {
          "display": {
            "name": "Redis health (min pool)"
          },
          "plugin": {
            "kind": "StatChart",
            "spec": {
              "calculation": "last-number",
              "format": {
                "unit": "decimal"
              }
            }
          },
          "queries": [
            {
              "kind": "TimeSeriesQuery",
              "spec": {
                "plugin": {
                  "kind": "PrometheusTimeSeriesQuery",
                  "spec": {
                    "query": "min({otel_metric_name=\"edgequota.redis.healthy\"})"
                  }
                }
              }
            }
          ]
        }
      },
      "cache": {
        "kind": "Panel",
        "spec": {
          "display": {
            "name": "Cache hit rate (cacheable responses)",
            "description": "Of the responses the cache was eligible to serve, the share served from cache. Responses that are not cacheable at all are excluded — including them would make this track the caller's traffic mix rather than cache health. Empty when there is no cacheable traffic."
          },
          "plugin": {
            "kind": "StatChart",
            "spec": {
              "calculation": "last-number",
              "format": {
                "unit": "percent-decimal"
              }
            }
          },
          "queries": [
            {
              "kind": "TimeSeriesQuery",
              "spec": {
                "plugin": {
                  "kind": "PrometheusTimeSeriesQuery",
                  "spec": {
                    "query": "sum(rate({otel_metric_name=\"edgequota.response_cache.lookups\", edgequota_cache_result=\"hit\"}[5m])) / (sum(rate({otel_metric_name=\"edgequota.response_cache.lookups\", edgequota_cache_result=\"hit\"}[5m]))+sum(rate({otel_metric_name=\"edgequota.response_cache.lookups\", edgequota_cache_result=\"miss\"}[5m])))"
                  }
                }
              }
            }
          ]
        }
      },
      "cache_eligibility": {
        "kind": "Panel",
        "spec": {
          "display": {
            "name": "Cacheable responses",
            "description": "Share of cache-path lookups whose response the cache was eligible to store (200 or 301 with a positive max-age, not no-store/no-cache/private). This is a property of what the upstream returns, not of the cache: a low value means the cache is rarely offered anything to cache."
          },
          "plugin": {
            "kind": "StatChart",
            "spec": {
              "calculation": "last-number",
              "format": {
                "unit": "percent-decimal"
              }
            }
          },
          "queries": [
            {
              "kind": "TimeSeriesQuery",
              "spec": {
                "plugin": {
                  "kind": "PrometheusTimeSeriesQuery",
                  "spec": {
                    "query": "(sum(rate({otel_metric_name=\"edgequota.response_cache.lookups\", edgequota_cache_result=\"hit\"}[5m]))+sum(rate({otel_metric_name=\"edgequota.response_cache.lookups\", edgequota_cache_result=\"miss\"}[5m]))) / sum(rate({otel_metric_name=\"edgequota.response_cache.lookups\"}[5m]))"
                  }
                }
              }
            }
          ]
        }
      },
      "by_code": {
        "kind": "Panel",
        "spec": {
          "display": {
            "name": "Request rate by status code"
          },
          "plugin": {
            "kind": "TimeSeriesChart",
            "spec": {
              "legend": {
                "position": "bottom",
                "mode": "list"
              },
              "yAxis": {
                "format": {
                  "unit": "decimal"
                }
              }
            }
          },
          "queries": [
            {
              "kind": "TimeSeriesQuery",
              "spec": {
                "plugin": {
                  "kind": "PrometheusTimeSeriesQuery",
                  "spec": {
                    "query": "sum by (edgequota_status_class)(rate({otel_metric_name=\"edgequota.requests\"}[5m]))",
                    "seriesNameFormat": "{{status_code}}"
                  }
                }
              }
            }
          ]
        }
      },
      "code_2xx": {
        "kind": "Panel",
