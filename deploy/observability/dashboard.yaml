              "kind": "TimeSeriesQuery",
              "spec": {
                "plugin": {
                  "kind": "PrometheusTimeSeriesQuery",
                  "spec": {
                    "query": "histogram_quantile(0.5, sum by (le)(rate({otel_metric_name=\"http.server.request.duration\", otel_metric_type=\"histogram\", service_name=\"edgequota\"}[5m])))",
                    "seriesNameFormat": "p50"
                  }
                }
