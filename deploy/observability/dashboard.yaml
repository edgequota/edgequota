              }
            }
          },
          "queries": [
            {
              "kind": "TimeSeriesQuery",
              "spec": {
                "plugin": {
                  "kind": "PrometheusTimeSeriesQuery",
                  "spec": {
                    "query": "sum(rate({otel_metric_name=\"edgequota.requests\", edgequota_status_class=\"2xx\"}[5m])) or vector(0)",
                    "seriesNameFormat": "2xx"
                  }
