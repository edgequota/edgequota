# EdgeQuota alerting rules — CANONICAL source of truth.
#
# EdgeQuota emits portable, vendor-neutral OpenTelemetry metrics (dotted names,
# semconv attributes, OTLP push). These rules are written against how an OTLP
# backend surfaces those metrics in PromQL:
#   - the metric NAME is matched via the `otel_metric_name` label, dotted and
#     verbatim (no `_total` / `_bucket` suffixes) — e.g. {otel_metric_name="edgequota.requests"};
#   - attribute KEYS are surfaced with dots replaced by underscores
#     (edgequota.status_class -> edgequota_status_class);
#   - histogram selectors carry otel_metric_type="histogram".
# The metric emission itself is backend-agnostic; only this query dialect targets
# the current consumer (Dash0). The infra mirror
# (shoro/infrastructure .../08_dash0/main.tf) adapts each rule to Dash0's
# $__threshold model — it MUST track this file, never lead it.
#
# Traffic/error/no-traffic rules key off edgequota.requests, the unconditional
# terminal counter that spans streaming (SSE/WS/gRPC) — unlike
# http.server.request.duration._count, which structurally excludes streaming.
#
# severity: critical = pages on-call; warning = investigate within hours.

groups:
  - name: edgequota
    rules:

      # --- Traffic & Availability ---

      - alert: EdgeQuotaHighErrorRate
        expr: |
          (
            sum(rate({otel_metric_name="edgequota.requests", edgequota_status_class="5xx"}[5m]))
            / clamp_min(sum(rate({otel_metric_name="edgequota.requests"}[5m])), 1)
          ) > 0.05
        for: 5m
        labels:
          severity: critical
          team: platform
          surface: edgequota
        annotations:
          summary: "EdgeQuota 5xx error rate above 5%"
          description: >-
            {{ $value | humanizePercentage }} of requests are returning 5xx status codes.
            Check backend health, Redis connectivity, and EdgeQuota logs.

      - alert: EdgeQuotaTrafficSpike
        expr: |
          sum(rate({otel_metric_name="edgequota.requests"}[5m]))
          / clamp_min(sum(rate({otel_metric_name="edgequota.requests"}[1h] offset 1h)), 0.01) > 2
        for: 5m
        labels:
          severity: warning
          team: platform
          surface: edgequota
        annotations:
          summary: "EdgeQuota traffic spike detected"
          description: >-
            Current request rate is more than 2x the rate from 1 hour ago.
            Verify whether this is expected (marketing campaign, deploy) or anomalous.

      - alert: EdgeQuotaNoTraffic
        # build_info was dropped in the OTel migration; liveness is now proven by the
        # presence of go.goroutine.count (emitted continuously by every live pod).
        expr: |
          sum(rate({otel_metric_name="edgequota.requests"}[5m])) < 0.01
          and on() sum({otel_metric_name="go.goroutine.count", service_name="edgequota"}) > 0
        for: 10m
        labels:
          severity: critical
          team: platform
          surface: edgequota
        annotations:
          summary: "EdgeQuota receiving no traffic"
          description: >-
            No requests have been processed for 10 minutes even though
            EdgeQuota pods are running. Check ingress routing and DNS.

      # --- Latency ---

      - alert: EdgeQuotaHighP99Latency
        expr: |
          histogram_quantile(0.99,
            sum by (le) (rate({otel_metric_name="http.server.request.duration", otel_metric_type="histogram", service_name="edgequota"}[5m]))
          ) > 2
        for: 5m
        labels:
          severity: warning
          team: platform
          surface: edgequota
        annotations:
          summary: "EdgeQuota P99 latency above 2 seconds"
          description: >-
            P99 request latency is {{ $value | humanizeDuration }}.
            Check backend latency, auth service, and Redis performance.

      - alert: EdgeQuotaP99LatencyCritical
        expr: |
          histogram_quantile(0.99,
            sum by (le) (rate({otel_metric_name="http.server.request.duration", otel_metric_type="histogram", service_name="edgequota"}[5m]))
          ) > 5
        for: 5m
        labels:
          severity: critical
          team: platform
          surface: edgequota
        annotations:
          summary: "EdgeQuota P99 latency above 5 seconds"
          description: >-
            P99 request latency is {{ $value | humanizeDuration }}.
            Likely a downstream dependency issue. Check backend and auth service.

      - alert: EdgeQuotaBackendLatencyHigh
        expr: |
          histogram_quantile(0.95,
            sum by (le) (rate({otel_metric_name="edgequota.backend.duration", otel_metric_type="histogram"}[5m]))
          ) > 5
        for: 5m
        labels:
          severity: warning
          team: platform
          surface: edgequota
        annotations:
          summary: "Backend P95 latency above 5 seconds"
          description: >-
            The upstream backend is responding slowly. This is likely a
            backend-side issue, not EdgeQuota.

      # --- Rate Limiting ---

      - alert: EdgeQuotaHighRateLimitRatio
        expr: |
          (
            sum(rate({otel_metric_name="edgequota.ratelimit.decisions", edgequota_ratelimit_decision="limited"}[5m]))
            / clamp_min(
                sum(rate({otel_metric_name="edgequota.ratelimit.decisions", edgequota_ratelimit_decision="allowed"}[5m]))
                + sum(rate({otel_metric_name="edgequota.ratelimit.decisions", edgequota_ratelimit_decision="limited"}[5m])), 1)
          ) > 0.5
        for: 5m
        labels:
          severity: warning
          team: platform
          surface: edgequota
        annotations:
          summary: "More than 50% of requests are rate-limited"
          description: >-
            {{ $value | humanizePercentage }} of all requests are being rejected
            with 429. Review rate limit configuration or investigate a traffic surge.

      - alert: EdgeQuotaConcurrencyRejections
        expr: sum(rate({otel_metric_name="edgequota.concurrency.rejected"}[5m])) > 0
        for: 2m
        labels:
          severity: warning
          team: platform
          surface: edgequota
        annotations:
          summary: "EdgeQuota rejecting requests due to concurrency limit"
          description: >-
            Requests are being rejected with 503 because max_concurrent_requests
            was reached. Consider increasing the limit or scaling horizontally.

      # --- Redis ---

      - alert: EdgeQuotaRedisUnhealthy
        expr: min by (edgequota_redis_pool, k8s_pod_name)({otel_metric_name="edgequota.redis.healthy"}) < 1
        for: 1m
        labels:
          severity: critical
          team: platform
          surface: edgequota
        annotations:
          summary: "EdgeQuota Redis pool {{ $labels.edgequota_redis_pool }} is unhealthy"
          description: >-
            Redis connectivity is down for pool {{ $labels.edgequota_redis_pool }} on {{ $labels.k8s_pod_name }}.
            Rate limiting may be degraded (in-memory fallback or fail-closed).

      - alert: EdgeQuotaRedisErrors
        expr: sum by (edgequota_redis_pool)(rate({otel_metric_name="edgequota.redis.errors"}[5m])) > 1
        for: 2m
        labels:
          severity: warning
          team: platform
          surface: edgequota
        annotations:
          summary: "EdgeQuota Redis errors on pool {{ $labels.edgequota_redis_pool }}"
          description: >-
            Redis errors are occurring at {{ $value | humanize }}/s on pool {{ $labels.edgequota_redis_pool }}.
            Check Redis cluster health and network connectivity.

      - alert: EdgeQuotaFallbackActive
        expr: sum by (edgequota_redis_pool)(rate({otel_metric_name="edgequota.ratelimit.fallback_used"}[5m])) > 0
        for: 2m
        labels:
          severity: warning
          team: platform
          surface: edgequota
        annotations:
          summary: "EdgeQuota in-memory fallback active for pool {{ $labels.edgequota_redis_pool }}"
          description: >-
            Redis pool {{ $labels.edgequota_redis_pool }} is unreachable and EdgeQuota has switched to
            in-memory rate limiting. Distributed rate limits are not enforced.

      # --- Auth Service ---

      - alert: EdgeQuotaAuthErrors
        expr: sum(rate({otel_metric_name="edgequota.auth.outcomes", edgequota_auth_outcome="error"}[5m])) > 0
        for: 2m
        labels:
          severity: critical
          team: platform
          surface: edgequota
        annotations:
          summary: "Auth service returning errors"
          description: >-
            EdgeQuota auth service calls are failing at {{ $value | humanize }}/s.
            Depending on failure_policy, requests may be passing through unauthenticated.
            (outcome=error only — client-cancel disconnects are tracked separately.)

      - alert: EdgeQuotaAuthLatencyHigh
        expr: |
          histogram_quantile(0.95,
            sum by (le) (rate({otel_metric_name="edgequota.auth.duration", otel_metric_type="histogram"}[5m]))
          ) > 1
        for: 5m
        labels:
          severity: warning
          team: platform
          surface: edgequota
        annotations:
          summary: "Auth service P95 latency above 1 second"
          description: >-
            External auth checks are slow, adding latency to every request.
            Check auth service health.

      # --- Events ---

      - alert: EdgeQuotaEventsDropped
        expr: sum(rate({otel_metric_name="edgequota.events.dropped"}[5m])) > 0
        for: 5m
        labels:
          severity: warning
          team: platform
          surface: edgequota
        annotations:
          summary: "EdgeQuota dropping usage events"
          description: >-
            The event ring buffer is overflowing. Usage data is being lost.
            Consider increasing buffer size or reducing event volume.

      - alert: EdgeQuotaEventSendFailures
        expr: sum(rate({otel_metric_name="edgequota.events.send_failures"}[5m])) > 0
        for: 5m
        labels:
          severity: warning
          team: platform
          surface: edgequota
        annotations:
          summary: "EdgeQuota event batches failing to send"
          description: >-
            Event batches are failing after all retries. Check the events
            endpoint connectivity.

      # --- Response Cache ---

      # Measured over cache-ELIGIBLE traffic only: "hit" and "miss" both imply a
      # response the cache could serve, while responses that are not cacheable
      # at all are recorded as result="uncacheable" and excluded here. Including
      # them would make this ratio track the caller's traffic mix rather than
      # cache health, since a deployment serving mostly uncacheable responses
      # would sit permanently near zero however well the cache performs.
      #
      # The trailing guard is a presence check (> 0), not a traffic threshold:
      # it exists solely to suppress the 0/0 when nothing cacheable was served,
      # which is exactly when the ratio is undefined. Any positive rate here
      # would instead encode one deployment's traffic volume — eligible traffic
      # is a property of what the backends serve, so a rate that means "quiet"
      # for one deployment means "busy" for another, and the alert would go
      # deaf or noisy purely on deployment size. Ratios self-normalize; guard
      # on definedness only.
      #
      # For the same reason there is no clamp_min on the denominator: clamping
      # floors a sub-1/s denominator to 1, turning the ratio into an absolute
      # rate that fires on a healthy cache at low volume.
      - alert: EdgeQuotaLowCacheHitRate
        expr: |
          (
            sum(rate({otel_metric_name="edgequota.response_cache.lookups", edgequota_cache_result="hit"}[15m]))
            / (
                sum(rate({otel_metric_name="edgequota.response_cache.lookups", edgequota_cache_result="hit"}[15m]))
                + sum(rate({otel_metric_name="edgequota.response_cache.lookups", edgequota_cache_result="miss"}[15m])))
          ) < 0.3
          and on() (
            sum(rate({otel_metric_name="edgequota.response_cache.lookups", edgequota_cache_result="hit"}[15m]))
            + sum(rate({otel_metric_name="edgequota.response_cache.lookups", edgequota_cache_result="miss"}[15m]))
          ) > 0
        for: 15m
        labels:
          severity: warning
          team: platform
          surface: edgequota
        annotations:
          summary: "Response cache hit rate below 30% on cacheable responses"
          description: >-
            Of the responses the cache was eligible to serve, only
            {{ $value | humanizePercentage }} were served from cache.
            Check Redis health and whether cache TTLs are short relative to how
            often the same resources are requested. Responses that are not
            cacheable at all are excluded from this ratio — see
            edgequota_cache_result="uncacheable" for that share.

      # --- System Resources ---
      # container/k8s/go.* metrics are portable and shared across services, so each
      # is scoped by k8s_deployment_name="edgequota".

      - alert: EdgeQuotaHighMemory
        expr: max(k8s_pod_memory_limit_utilization_ratio{k8s_deployment_name="edgequota"}) > 0.85
        for: 5m
        labels:
          severity: warning
          team: platform
          surface: edgequota
        annotations:
          summary: "EdgeQuota memory usage above 85% of limit"
          description: >-
            Pod {{ $labels.k8s_pod_name }} is using {{ $value | humanizePercentage }} of
            its memory limit. Risk of OOM kill.

      - alert: EdgeQuotaHighGoroutines
        # go.goroutine.count comes from the OTel runtime instrumentation
        # (runtime.Start), restored when the Prometheus Go collector was removed.
        expr: max({otel_metric_name="go.goroutine.count", service_name="edgequota"}) > 10000
        for: 5m
        labels:
          severity: warning
          team: platform
          surface: edgequota
        annotations:
          summary: "EdgeQuota goroutine count unusually high"
          description: >-
            {{ $labels.k8s_pod_name }} has {{ $value }} goroutines. This may indicate
            a goroutine leak or extremely high concurrency.

      - alert: EdgeQuotaGoroutineGrowth
        expr: max(deriv({otel_metric_name="go.goroutine.count", service_name="edgequota"}[15m])) > 1
        for: 30m
        labels:
          severity: warning
          team: platform
          surface: edgequota
        annotations:
          summary: "EdgeQuota goroutines growing on {{ $labels.k8s_pod_name }}"
          description: >-
            Goroutine count is growing at more than 1/sec, sustained over
            30 minutes. Classic signature of a goroutine leak — e.g.
            transports not closed on SwapProxy, recovery loops not
            joined, or HTTP/2 ping goroutines left dangling. Pull a
            /debug/pprof/goroutine?debug=2 from the affected pod to
            identify the leaked stack.
